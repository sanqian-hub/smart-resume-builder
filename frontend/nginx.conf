# 这是替换/etc/nginx/conf.d/default.conf的配置文件
server {
  listen       80;
  server_name  sanqian.cc www.sanqian.cc;

  # nginx容器默认的静态文件目录，与Dockerfile中COPY的路径对应
  root   /usr/share/nginx/html;
  index  index.html index.htm;

  # 解决前端history路由刷新404问题（Vue/React/Angular必加）
  location / {
    try_files $uri $uri/ /index.html;
  }

  # 静态资源缓存优化（提升加载速度）
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    add_header Access-Control-Allow-Origin *;
  }

  # 错误页面配置
  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;
  }
}

# 后端子域名配置（user-backend.sanqian.cc）
server {
  listen       80;
  server_name  user-backend.sanqian.cc;

  # 后端接口代理（核心配置）
  location ^~ /api/ {
    # 1. 代理转发（根据后端接口前缀决定是否加末尾/）
    # 这里走容器内部网络，必须先把容器加入到同一个网络中
    proxy_pass http://user-center-backend:8080/api/;  # 推荐：不带/，转发时保留 /api/ 前缀
    # 如果后端接口必须带 /api/ 前缀，才改成：proxy_pass http://127.0.0.1:8080/api/;

    add_header 'Access-Control-Allow-Origin' $http_origin;
    add_header 'Access-Control-Allow-Credentials' 'true';
    add_header Access-Control-Allow-Methods 'GET, PUT, POST, OPTIONS';
    add_header Access-Control-Allow-Headers '*';

    if ($request_method = 'OPTIONS') {
      add_header 'Access-Control-Allow-Credentials' 'true';
      add_header 'Access-Control-Allow-Origin' $http_origin;
      add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, OPTIONS';
      add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
      add_header 'Access-Control-Max-Age' 1728000;
      add_header 'Content-Type' 'text/plain; charset=utf-8';
      add_header 'Content-Length' 0;
      return 204;
    }
  }

  # 后端错误页面
  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;  # 复用前端的50x页面，也可自定义
  }

}
